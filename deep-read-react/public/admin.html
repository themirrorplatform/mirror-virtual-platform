<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>The Deep Read — admin</title>
  <style>
    :root { --bg:#0b0b0d; --ink:#ece9e2; --dim:#8a877f; --gold:#c9a24b; --line:#23231f; --red:#d98a8a; --green:#8ad9a0; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
    h1 { font-size: 1.1rem; letter-spacing:.04em; font-weight:600; margin:0 0 .25rem; }
    .mono { font-family: ui-monospace,SFMono-Regular,Menlo,monospace; }
    .sub { color:var(--dim); font-size:.8rem; letter-spacing:.06em; margin:0 0 2rem; }
    .back { display:inline-block; margin-bottom:1.4rem; color:var(--dim); font-family:ui-monospace,monospace; font-size:.72rem; letter-spacing:.06em; text-decoration:none; }
    .back:hover { color:var(--gold); }
    .gate { display:flex; gap:.5rem; max-width:440px; }
    input, textarea { background:#141416; border:1px solid var(--line); color:var(--ink); padding:.6rem .7rem; border-radius:6px; font-family: ui-monospace,monospace; font-size:.86rem; }
    .gate input { flex:1; }
    button { background:var(--gold); color:#1a1500; border:0; padding:.6rem .9rem; border-radius:6px; font-weight:600; cursor:pointer; }
    button.ghost { background:transparent; color:var(--dim); border:1px solid var(--line); }
    .tabs { display:flex; gap:.5rem; align-items:center; margin:1.4rem 0 1rem; border-bottom:1px solid var(--line); padding-bottom:.7rem; }
    .tab { background:transparent; color:var(--dim); border:1px solid var(--line); }
    .tab.active { color:var(--gold); border-color:var(--gold); }
    .bar { display:flex; align-items:center; gap:1rem; margin:0 0 1rem; flex-wrap:wrap; }
    .count { font-family: ui-monospace,monospace; color:var(--gold); }
    .err { color:var(--red); font-family: ui-monospace,monospace; font-size:.8rem; min-height:1.2em; }
    table { width:100%; border-collapse:collapse; font-size:.86rem; }
    th,td { text-align:left; padding:.5rem .6rem; border-bottom:1px solid var(--line); vertical-align:top; }
    th { color:var(--dim); font-weight:500; font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; }
    td.mono { font-family: ui-monospace,monospace; color:var(--dim); white-space:nowrap; }
    .hidden { display:none; }
    .empty { color:var(--dim); padding:2rem 0; }
    /* content editor */
    #cform label { display:block; margin:0 0 1.2rem; }
    #cform .lab { display:block; color:var(--dim); font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; margin-bottom:.4rem; }
    #cform input[type=text], #cform textarea { width:100%; font-family:inherit; font-size:.95rem; }
    #cform textarea { min-height:84px; resize:vertical; }
    #c-crest-preview { display:block; max-width:140px; margin-top:.7rem; border:1px solid var(--line); border-radius:6px; }
    .saverow { display:flex; align-items:center; gap:1rem; margin-top:.5rem; }
    #c-status { font-family:ui-monospace,monospace; font-size:.78rem; color:var(--dim); }
    #c-status.ok { color:var(--green); } #c-status.bad { color:var(--red); }
    .hint { color:var(--dim); font-size:.72rem; margin:.3rem 0 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← Back to The Deep Read</a>
    <h1>The Deep Read — admin</h1>
    <p class="sub mono">Private admin · sign in to manage the witness list and site content.</p>

    <form id="gate" class="gate">
      <input id="token" type="password" placeholder="Admin password" autocomplete="current-password" aria-label="Admin password" />
      <button type="submit">Sign in</button>
    </form>
    <p id="err" class="err"></p>

    <div id="panel" class="hidden">
      <div class="tabs">
        <button id="tab-witnesses" class="tab active" type="button">Witnesses</button>
        <button id="tab-content" class="tab" type="button">Home content</button>
        <button id="signout" class="ghost" type="button" style="margin-left:auto">Sign out</button>
      </div>

      <!-- witnesses -->
      <div id="view-witnesses">
        <div class="bar">
          <span class="count"><span id="count">0</span> witnesses</span>
          <button id="csv" class="ghost" type="button">Download CSV</button>
          <button id="refresh" class="ghost" type="button">Refresh</button>
        </div>
        <table>
          <thead><tr><th>When</th><th>Email</th><th>Name</th><th>Source</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
        <p id="empty" class="empty hidden">No one has saved a seat yet.</p>
      </div>

      <!-- home content -->
      <div id="view-content" class="hidden">
        <form id="cform">
          <label><span class="lab">Hero headline</span>
            <input id="c-headline" type="text" placeholder="The Deep Read" /></label>
          <label><span class="lab">Intro paragraph</span>
            <textarea id="c-intro" placeholder="A first-of-its-kind experiment…"></textarea></label>
          <label><span class="lab">“Your seat” invitation copy</span>
            <textarea id="c-seat" placeholder="Play along with the public round…"></textarea></label>
          <label><span class="lab">Hero crest image</span>
            <input id="c-crest-file" type="file" accept="image/*" />
            <img id="c-crest-preview" class="hidden" alt="crest preview" />
            <p class="hint">Leave a field blank to keep the original wording. Changes publish instantly.</p></label>
          <div class="saverow">
            <button type="submit">Save &amp; publish</button>
            <span id="c-status"></span>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const FN = '/.netlify/functions/admin-witnesses';
    const CFN = '/.netlify/functions/admin-content';
    const UFN = '/.netlify/functions/admin-upload';
    const $ = (id) => document.getElementById(id);
    const tokenKey = 'tdr_admin_token';
    const token = () => sessionStorage.getItem(tokenKey);
    const fmt = (iso) => { try { return new Date(iso).toISOString().replace('T',' ').slice(0,16); } catch { return iso; } };
    const escapeHtml = (s) => String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    let contentData = {}, crestUrl = '';

    async function load() {
      if (!token()) return showGate();
      $('err').textContent = '';
      let res;
      try { res = await fetch(FN, { headers: { 'x-admin-token': token() } }); }
      catch { $('err').textContent = 'Network error.'; return; }
      if (res.status === 401) { sessionStorage.removeItem(tokenKey); showGate('Wrong password.'); return; }
      if (!res.ok) { $('err').textContent = 'Error ' + res.status; return; }
      const { count, rows } = await res.json();
      $('count').textContent = count;
      $('rows').innerHTML = rows.map((r) =>
        `<tr><td class="mono">${fmt(r.created_at)}</td><td>${escapeHtml(r.email)}</td><td>${escapeHtml(r.name||'')}</td><td class="mono">${escapeHtml(r.source||'')}</td></tr>`
      ).join('');
      $('empty').classList.toggle('hidden', count > 0);
      $('gate').classList.add('hidden'); $('panel').classList.remove('hidden');
    }
    function showGate(msg) { $('panel').classList.add('hidden'); $('gate').classList.remove('hidden'); if (msg) $('err').textContent = msg; }

    function showTab(name) {
      $('tab-witnesses').classList.toggle('active', name === 'witnesses');
      $('tab-content').classList.toggle('active', name === 'content');
      $('view-witnesses').classList.toggle('hidden', name !== 'witnesses');
      $('view-content').classList.toggle('hidden', name !== 'content');
      if (name === 'content') loadContent();
    }

    async function loadContent() {
      $('c-status').className = ''; $('c-status').textContent = 'Loading…';
      const res = await fetch(CFN, { headers: { 'x-admin-token': token() } });
      if (res.status === 401) { sessionStorage.removeItem(tokenKey); showGate('Session expired — sign in again.'); return; }
      if (!res.ok) { $('c-status').textContent = 'Load error ' + res.status; return; }
      contentData = (await res.json()) || {};
      const home = contentData.home || {};
      $('c-headline').value = home.headline || '';
      $('c-intro').value = home.intro || '';
      $('c-seat').value = home.seatCopy || '';
      crestUrl = home.crest || '';
      updateCrest();
      $('c-status').textContent = '';
    }
    function updateCrest() {
      const img = $('c-crest-preview');
      if (crestUrl) { img.src = crestUrl; img.classList.remove('hidden'); } else img.classList.add('hidden');
    }

    $('c-crest-file').addEventListener('change', async (e) => {
      const file = e.target.files[0]; if (!file) return;
      $('c-status').className = ''; $('c-status').textContent = 'Uploading image…';
      const dataBase64 = await new Promise((res) => { const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.readAsDataURL(file); });
      const res = await fetch(UFN, { method: 'POST', headers: { 'x-admin-token': token(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: file.name, contentType: file.type, dataBase64 }) });
      if (!res.ok) { $('c-status').className = 'bad'; $('c-status').textContent = 'Upload failed (' + res.status + ')'; return; }
      crestUrl = (await res.json()).url; updateCrest();
      $('c-status').className = 'ok'; $('c-status').textContent = 'Image uploaded — click Save to publish.';
    });

    $('cform').addEventListener('submit', async (e) => {
      e.preventDefault();
      $('c-status').className = ''; $('c-status').textContent = 'Saving…';
      contentData.home = Object.assign({}, contentData.home, {
        headline: $('c-headline').value.trim(),
        intro: $('c-intro').value.trim(),
        seatCopy: $('c-seat').value.trim(),
      });
      if (crestUrl) contentData.home.crest = crestUrl; else delete contentData.home.crest;
      const res = await fetch(CFN, { method: 'POST', headers: { 'x-admin-token': token(), 'Content-Type': 'application/json' }, body: JSON.stringify(contentData) });
      $('c-status').className = res.ok ? 'ok' : 'bad';
      $('c-status').textContent = res.ok ? 'Saved & published ✓  (refresh the homepage to see it)' : 'Save error ' + res.status;
    });

    $('gate').addEventListener('submit', (e) => { e.preventDefault(); sessionStorage.setItem(tokenKey, $('token').value.trim()); $('token').value = ''; showTab('witnesses'); load(); });
    $('refresh').addEventListener('click', load);
    $('signout').addEventListener('click', () => { sessionStorage.removeItem(tokenKey); showGate(); });
    $('tab-witnesses').addEventListener('click', () => showTab('witnesses'));
    $('tab-content').addEventListener('click', () => showTab('content'));
    $('csv').addEventListener('click', async () => {
      const res = await fetch(FN + '?format=csv', { headers: { 'x-admin-token': token() } });
      if (!res.ok) { $('err').textContent = 'CSV error ' + res.status; return; }
      const blob = await res.blob();
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'witnesses.csv'; a.click(); URL.revokeObjectURL(a.href);
    });

    load();
  </script>
</body>
</html>
